<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project IRIS</title>
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; color: #ffffff;
            margin: 0; padding: 0; height: 100vh; height: 100dvh; 
            box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column;
        }

        /* --- GLOBAL SVGs --- */
        .icon { width: 24px; height: 24px; fill: currentColor; display: inline-block; vertical-align: middle; }
        .icon-sm { width: 16px; height: 16px; fill: currentColor; display: inline-block; vertical-align: middle; }

        /* --- GLOBAL HEADER --- */
        #globalHeader {
            position: absolute; top: 0; left: 0; right: 0; height: 50px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 100; pointer-events: none;
        }
        #versionLabel { color: #888; font-size: 0.9rem; font-weight: bold; }
        #homeBtn {
            pointer-events: auto; background: none; border: 2px solid #555;
            border-radius: 8px; color: white; padding: 5px 8px; cursor: pointer; background-color: #222;
        }

        /* --- VIEW CONTAINERS --- */
        .view {
            display: none; flex-direction: column; align-items: center;
            width: 100%; height: 100%; padding: 60px 15px 15px 15px;
            box-sizing: border-box; overflow-y: auto;
        }
        .view.active { display: flex; }

        h1, h2, h3 { margin: 0 0 10px 0; }
        
        .logo-container {
            width: 200px; height: 200px; background-color: #222; border-radius: 15px;
            margin-bottom: 20px; display: flex; justify-content: center; align-items: center;
            overflow: hidden; animation: skeletonPulse 1.5s infinite;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s; }
        @keyframes skeletonPulse { 0% { background-color: #222; } 50% { background-color: #333; } 100% { background-color: #222; } }

        input[type="number"] {
            width: 100%; max-width: 300px; padding: 15px; font-size: 1.2rem; text-align: center;
            border-radius: 8px; border: 2px solid #444; background: #fff; color: #000; margin-bottom: 20px; box-sizing: border-box;
        }

        button {
            padding: 12px; font-size: 1rem; font-weight: bold; border: none; border-radius: 8px;
            cursor: pointer; transition: opacity 0.2s; -webkit-tap-highlight-color: transparent;
            user-select: none; display: flex; justify-content: center; align-items: center; gap: 5px;
        }
        button:active { opacity: 0.7; }
        button:disabled { background-color: #555 !important; color: #888 !important; }

        /* --- VIEW 1: LOGIN --- */
        #loginForm { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .login-controls { display: flex; gap: 10px; width: 100%; max-width: 300px; }
        #termsBtn { background-color: #ccc; color: #000; flex: 1; }
        #loginSubmitBtn { background-color: #4CAF50; color: #fff; flex: 1; }

        /* --- VIEW 2: HOME --- */
        .store-selector {
            background-color: #333; padding: 10px 20px; border-radius: 8px;
            font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;
            cursor: pointer; border: 2px solid #555; text-align: center;
        }
        #startPipelineBtn {
            width: 100%; max-width: 400px; background-color: #4CAF50; color: white;
            font-size: 1.4rem; padding: 20px; margin-bottom: 20px; border-radius: 12px;
        }
        .carrier-card {
            width: 100%; max-width: 400px; padding: 15px; margin-bottom: 15px;
            color: white; border-radius: 10px; cursor: pointer; text-align: left;
            display: flex; flex-direction: column; border: 2px solid transparent; transition: transform 0.1s;
        }
        .carrier-card:active { transform: scale(0.98); }
        .carrier-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .carrier-preview { font-size: 0.85rem; opacity: 0.9; white-space: pre-wrap; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .preview-empty { font-style: italic; opacity: 0.6; }
        #cardTMO { background-color: #e20074; }
        #cardVZW { background-color: #ed1c24; }
        #cardATT { background-color: #00a8e0; }

        /* --- VIEW 3: EDIT --- */
        .header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin-bottom: 10px; }
        #editBackBtn { background-color: #555; color: white; font-size: 1rem; padding: 8px 15px; }
        #editTitle { font-size: 1.1rem; color: #fff; font-weight: bold; flex-grow: 1; text-align: right; }
        #editArea {
            width: 100%; max-width: 600px; flex-grow: 1; background: #1e1e1e; color: #fff; border: 1px solid #444;
            border-radius: 8px; padding: 15px; font-size: 1rem; resize: none; box-sizing: border-box; margin-bottom: 10px;
        }
        .edit-controls { display: flex; gap: 10px; width: 100%; max-width: 600px; }
        #startScannerBtn { background-color: #00ff00; color: #000; flex: 1; font-size: 1.1rem; }
        #saveEditBtn { background-color: #2196F3; color: white; flex: 1; font-size: 1.1rem; }

        /* --- VIEW 4: SCANNER --- */
        .scanner-header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin-bottom: 5px; }
        #backFromScannerBtn { background-color: #555; color: white; padding: 5px 15px; display: none; }
        
        #guidedHeader {
            background: #333; padding: 8px 12px; border-radius: 8px; flex-grow: 1; 
            text-align: center; font-weight: bold; font-size: 0.9rem; cursor: pointer; border: 1px solid #555;
            display: flex; justify-content: center; align-items: center; gap: 5px; flex-direction: column;
        }
        .header-main-text { display: flex; align-items: center; gap: 5px; }
        .overwrite-warn { color: #ff9800; font-size: 0.75rem; }

        #status { font-weight: bold; color: #4CAF50; font-size: 0.8rem; text-align: right; min-width: 100px; }
        .pulsing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .video-container {
            position: relative; width: 100%; max-width: 400px; aspect-ratio: 1 / 1; 
            border: 3px solid #00ff00; border-radius: 10px; overflow: hidden; background: #000; margin-bottom: 10px; flex-shrink: 0; cursor: pointer; 
        }
        .focus-flash { border-color: #ffffff !important; transform: scale(0.97); transition: all 0.2s; }
        video { width: 100%; height: 100%; display: block; object-fit: cover; }

        .scanner-bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 600px; flex-grow: 1; min-height: 0; }
        #scannerList {
            width: 100%; height: 100%; background: #1e1e1e; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 10px;
            font-size: 0.85rem; resize: none; box-sizing: border-box; cursor: pointer; transition: background-color 1s ease-out;
        }
        .flash-green { background-color: #004400 !important; transition: none !important; }
        
        .scanner-actions { display: flex; flex-direction: column; gap: 8px; }
        .undo-row { display: flex; gap: 5px; }
        .undo-row button { flex: 1; background-color: #444; color: white; padding: 8px; }
        #scanToListBtn { background-color: #00ff00; color: #000; flex-grow: 1; font-size: 1.2rem; }
        
        .classic-actions { display: none; }
        .guided-actions { display: none; flex-direction: column; gap: 5px; }
        #doneScannerBtn { background-color: #2196F3; color: white; padding: 15px; width: 100%; }
        #saveNextRouteBtn { background-color: #2196F3; color: white; padding: 15px; font-size: 1.1rem; }

        /* --- MODALS --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-box {
            display: none; background: #222; padding: 25px; border-radius: 15px;
            border: 2px solid #555; width: 100%; max-width: 350px; text-align: center; flex-direction: column; gap: 15px;
        }
        .modal-box.active { display: flex; }
        .modal-btn-row { display: flex; gap: 10px; }
        .modal-btn-row button { flex: 1; }
        .btn-secondary { background-color: #555; color: white; }
        .btn-primary { background-color: #4CAF50; color: white; }
        .btn-danger { background-color: #f44336; color: white; }
        
        .route-btn { background-color: #333; color: white; padding: 15px; font-size: 1.1rem; border: 1px solid #555; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; font-size: 1rem; border-radius: 6px; border: 1px solid #444; background: #fff; color: #000; box-sizing: border-box; }
        #publishEditBtn, #publishScannerBtn { background-color: #9c27b0; color: white; }
        #settingsBtn { pointer-events: auto; background: none; border: none; color: white; cursor: pointer; padding: 5px; }
        
        #hiddenCanvas { display: none; }
        
        /* --- VIEW 5: CROP --- */
        #uploadImageBtn { background-color: #2196F3; color: white; padding: 8px; font-size: 1rem; flex-shrink: 0; }
        .crop-header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 600px; margin-bottom: 20px; }
        #cancelCropBtn { background-color: #555; color: white; padding: 5px 15px; }
        .crop-container {
            position: relative; width: 100%; max-width: 400px; aspect-ratio: 1 / 1; 
            border: 3px solid #2196F3; border-radius: 10px; overflow: hidden; background: #222; margin-bottom: 20px;
        }
        #cropImage { position: absolute; transform-origin: top left; cursor: grab; }
        #cropImage:active { cursor: grabbing; }
        .zoom-controls { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 400px; margin-bottom: 20px; }
        .zoom-controls input[type="range"] { flex-grow: 1; }
        #confirmCropBtn { background-color: #4CAF50; color: white; padding: 15px; width: 100%; max-width: 400px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <!-- GLOBAL HEADER -->
    <div id="globalHeader">
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="versionLabel">v0.15.2</div>
            <button id="settingsBtn" title="GitHub Settings">
                <svg class="icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
            </button>
        </div>
        <button id="homeBtn" title="Home">
            <svg class="icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </button>
    </div>

    <!-- VIEW 1: LOGIN -->
    <div id="viewLogin" class="view active">
        <div class="logo-container">
            <img src="https://i.imgur.com/f8ucThF.jpeg" alt="Project IRIS Logo" onload="this.style.opacity=1; this.parentElement.style.animation='none';">
        </div>
        <form id="loginForm">
            <h3>Store #</h3>
            <input type="number" id="inputStore" placeholder="Enter store number" required>
            <h3>App PIN</h3>
            <input type="number" pattern="[0-9]*" inputmode="numeric" id="inputPin" placeholder="Enter PIN" required style="-webkit-text-security: disc;">
            <div class="login-controls">
                <button type="button" id="termsBtn">TERMS OF USE</button>
                <button type="submit" id="loginSubmitBtn" style="display:none;">LOG IN</button>
            </div>
        </form>
    </div>

    <!-- VIEW 2: HOME -->
    <div id="viewHome" class="view">
        <div class="store-selector" id="storeSelectorBtn">
            Selected store:<br>
            <svg class="icon-sm" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            <span id="displayStore">----</span>
        </div>
        
        <button id="startPipelineBtn">START SCANNING</button>
        
        <div class="carrier-card" id="cardTMO" data-carrier="TMO">
            <div class="carrier-title">T-Mobile</div>
            <div class="carrier-preview" id="previewTMO">Loading...</div>
        </div>
        <div class="carrier-card" id="cardVZW" data-carrier="VZW">
            <div class="carrier-title">Verizon</div>
            <div class="carrier-preview" id="previewVZW">Loading...</div>
        </div>
        <div class="carrier-card" id="cardATT" data-carrier="ATT">
            <div class="carrier-title">AT&T</div>
            <div class="carrier-preview" id="previewATT">Loading...</div>
        </div>
    </div>

    <!-- VIEW 3: EDIT (Classic) -->
    <div id="viewEdit" class="view">
        <div class="header-row">
            <button id="editBackBtn">❮ BACK</button>
            <div id="editTitle">ATT (1698) - TAP TO EDIT</div>
        </div>
        <textarea id="editArea" maxlength="15000" placeholder="Type or scan inventory here..."></textarea>
        <div class="edit-controls">
            <button id="startScannerBtn">ADD FROM SCANNER</button>
            <button id="saveEditBtn">SAVE AS CURRENT</button>
        </div>
        <button id="publishEditBtn" style="width: 100%; max-width: 600px; margin-top: 10px; padding: 15px; font-size: 1.1rem;">☁️ PUBLISH TO CLOUD</button>
    </div>

    <!-- VIEW 4: SCANNER (Dual Mode) -->
    <div id="viewScanner" class="view">
        <div class="scanner-header">
            <button id="backFromScannerBtn">❮ BACK</button>
            <div id="guidedHeader">
                <div class="header-main-text">
                    <span id="guidedHeaderText">1698 TMO</span>
                    <svg class="icon-sm" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/></svg>
                </div>
                <span id="guidedHeaderWarn" class="overwrite-warn"></span>
            </div>
            <button id="uploadImageBtn" title="Upload Image"><svg class="icon" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
            <input type="file" id="imageUploadInput" accept="image/*" style="display: none;">
            <div id="status">Ready.</div>
        </div>

        <div class="video-container" id="videoContainer">
            <video id="cameraFeed" autoplay playsinline></video>
        </div>

        <div class="scanner-bottom">
            <textarea id="scannerList" maxlength="15000" placeholder="List memory..."></textarea>
            
            <div class="scanner-actions">
                <div class="undo-row">
                    <button id="undoBtn" title="Undo"><svg class="icon" viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C20.48 10.3 16.94 8 12.5 8z"/></svg></button>
                    <button id="redoBtn" title="Redo"><svg class="icon" viewBox="0 0 24 24"><path d="M11.5 8C15.94 8 19.52 10.3 20.9 14.12l-2.37.78C17.45 11.71 14.46 9.4 10.92 9.4c-1.96 0-3.73.72-5.12 1.88L9.42 14.9H.42v-9l3.6 3.6C5.87 8.99 8.27 8 10.92 8z"/></svg></button>
                </div>
                <button id="scanToListBtn">SCAN TO LIST</button>
                
                <div class="classic-actions" id="classicActions">
                    <button id="doneScannerBtn">DONE WITH SCANNER</button>
                </div>
                
                <div class="guided-actions" id="guidedActions">
                    <button id="saveNextRouteBtn">SAVE & GO TO VZW</button>
                    <button id="publishScannerBtn" style="padding: 15px; font-size: 1.1rem;">☁️ PUBLISH TO CLOUD</button>
                </div>
            </div>
        </div>
    </div>

    <!-- VIEW 5: CROP -->
    <div id="viewCrop" class="view">
        <div class="crop-header">
            <button id="cancelCropBtn">❮ CANCEL</button>
            <h3>Crop Image</h3>
            <div style="width: 70px;"></div> <!-- Spacer -->
        </div>
        <div class="crop-container" id="cropContainer">
            <img id="cropImage" src="" alt="Crop Preview">
        </div>
        <div class="zoom-controls">
            <span>🔍</span>
            <input type="range" id="cropZoomSlider" min="0.1" max="3" step="0.01" value="1">
        </div>
        <button id="confirmCropBtn">CONFIRM CROP & SCAN</button>
    </div>

    <!-- MODALS -->
    <div id="modalOverlay" class="modal-overlay">
        <div id="modalTerms" class="modal-box">
            <h3>Terms of Use</h3><p>Terms of use isn't made yet.</p>
            <button class="btn-primary" onclick="window.hideModal()">OK</button>
        </div>
        <div id="modalStore" class="modal-box">
            <h3>Change Store #</h3>
            <input type="number" id="newStoreInput" placeholder="New Store #">
            <div class="modal-btn-row">
                <button class="btn-secondary" onclick="window.hideModal()">Cancel</button>
                <button class="btn-primary" id="confirmStoreChangeBtn">Save</button>
            </div>
        </div>
        <div id="modalBackWarn" class="modal-box">
            <h3>Unsaved Changes!</h3><p>Changes will be lost.</p>
            <div class="modal-btn-row">
                <button class="btn-secondary" onclick="window.hideModal()">Cancel</button>
                <button class="btn-danger" id="confirmBackWarnBtn">Yes, Go Back</button>
            </div>
        </div>
        <div id="modalGuidedRoute" class="modal-box" style="gap:10px;">
            <h3>Change Carrier</h3>
            <button class="route-btn" onclick="window.guidedSwitchRoute('TMO')">T-Mobile</button>
            <button class="route-btn" onclick="window.guidedSwitchRoute('VZW')">Verizon</button>
            <button class="route-btn" onclick="window.guidedSwitchRoute('ATT')">AT&T</button>
            <button class="btn-secondary" style="margin-top:10px;" onclick="document.getElementById('storeSelectorBtn').click()">Change Store #</button>
            <button class="btn-primary" onclick="window.hideModal()">Cancel</button>
        </div>
        <div id="modalGhSettings" class="modal-box">
            <h3>Cloud Publisher</h3>
            <div class="form-group">
                <label>GitHub Username</label>
                <input type="text" id="ghUser" placeholder="e.g. spamfan">
            </div>
            <div class="form-group">
                <label>Repository Name</label>
                <input type="text" id="ghRepo" placeholder="e.g. optimizer">
            </div>
            <div class="form-group">
                <label>Personal Access Token</label>
                <input type="password" id="ghToken" placeholder="ghp_...">
            </div>
            <div class="modal-btn-row">
                <button class="btn-secondary" onclick="window.hideModal()">Cancel</button>
                <button class="btn-primary" id="saveGhSettingsBtn">Save</button>
            </div>
        </div>
    </div>

    <canvas id="hiddenCanvas"></canvas>

    <!-- FIREBASE INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- CONFIGURATION ---
        const OCR_API_KEY = 'K83239282988957'; 
        const SECRET_SUFFIX = atob('MTAyMA=='); // "1020"
        const EXPIRY_MS = 8 * 60 * 60 * 1000; 
        const CARRIER_ORDER = ['TMO', 'VZW', 'ATT'];

        const firebaseConfig = {
            apiKey: "AIzaSyDHVW6d6n-lS43mf9DIsSYJjzBWvk4B1R4",
            authDomain: "optimizer-data.firebaseapp.com",
            databaseURL: "https://optimizer-data-default-rtdb.firebaseio.com",
            projectId: "optimizer-data",
            storageBucket: "optimizer-data.firebasestorage.app",
            messagingSenderId: "162386405726",
            appId: "1:162386405726:web:a5f22c3810152949b947cf"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- STATE ---
        let currentStore = "";
        let currentCarrier = "";
        let scannerMode = "guided"; 
        let currentStream = null;
        let originalEditText = "";
        let undoStack = []; let redoStack = [];
        let storeInventoryData = { TMO: null, VZW: null, ATT: null }; // Live synced from Firebase
        let fbListenerUnsubscribe = null;

        // --- DOM ---
        const views = document.querySelectorAll('.view');
        const modalOverlay = document.getElementById('modalOverlay');
        const modals = document.querySelectorAll('.modal-box');
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const editArea = document.getElementById('editArea');
        const scannerList = document.getElementById('scannerList');

        // --- FIREBASE REAL-TIME ENGINE ---
        function subscribeToStore(store) {
            if (fbListenerUnsubscribe) fbListenerUnsubscribe(); // Detach old
            const storeRef = ref(db, `inventory/${store}`);
            
            fbListenerUnsubscribe = onValue(storeRef, (snapshot) => {

        async function publishToGitHub(btnElement) {
            const config = JSON.parse(localStorage.getItem('gh_config') || '{}');
            if (!config.token) {
                alert("Please configure GitHub settings first (Gear icon).");
                return;
            }
            
            const origText = btnElement.innerText;
            btnElement.innerText = "☁️ PUBLISHING...";
            btnElement.disabled = true;

            try {
                // 1. Fetch entire inventory from Firebase
                const snapshot = await get(ref(db, 'inventory'));
                const allData = snapshot.val() || {};
                
                // 2. Format and encode
                const content = btoa(JSON.stringify({ inventory: allData }, null, 2));
                const url = `https://api.github.com/repos/${config.user}/${config.repo}/contents/inventory_data.json`;
                
                // 3. Get SHA (Needed for overwriting existing files in GitHub)
                const getReq = await fetch(url, { headers: { 'Authorization': `token ${config.token}` } });
                const getRes = await getReq.json();
                const sha = getRes.sha; 
                
                // 4. PUT Update
                const bodyPayload = {
                    message: `IRIS Mobile Update ${new Date().toISOString()}`,
                    content: content
                };
                if (sha) bodyPayload.sha = sha;

                const putReq = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${config.token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bodyPayload)
                });

                if (putReq.ok) {
                    btnElement.innerText = "✅ PUBLISHED!";
                    btnElement.style.backgroundColor = "#4CAF50";
                } else {
                    const err = await putReq.json();
                    alert(`GitHub Error: ${err.message}`);
                    btnElement.innerText = "❌ FAILED";
                    btnElement.style.backgroundColor = "#f44336";
                }
            } catch (e) {
                alert(`Publish Error: ${e.message}`);
                btnElement.innerText = "❌ FAILED";
                btnElement.style.backgroundColor = "#f44336";
            }
            
            setTimeout(() => {
                btnElement.innerText = origText;
                btnElement.disabled = false;
                btnElement.style.backgroundColor = ""; // Reset to CSS default
            }, 3000);
        }

        // --- OCR LOGIC (Modular Pipeline) ---
        async function processOCR(base64Image) {
            statusEl.innerText = "📸 Analyzing..."; statusEl.classList.add('pulsing');
            
            const formData = new FormData();
            formData.append('apikey', OCR_API_KEY);
            formData.append('base64Image', base64Image);
            formData.append('OCREngine', '2'); 
            formData.append('scale', 'true'); 
            formData.append('isTable', 'true'); 

            try {
                const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: formData });
                const json = await res.json();
                statusEl.classList.remove('pulsing');

                if (!json.IsErroredOnProcessing && json.ParsedResults && json.ParsedResults.length > 0) {
                    const rawText = json.ParsedResults[0].ParsedText;
                    
                    // Stage 1: The Garbage Cleaver (Pre-Split)
                    const cleaverList = [
                        'please from below', 'in order to view', 'detailed information', 
                        'make changes', 'show show', 'out of stoc', 'family mobile', 
                        'straight talk', 'ol t :', '1 t t :', 'ou 1 :', 'x n metro', 
                        'click any row', '\\(carrier\\)', 't-mobile', 'at&t', 'verizon', 'cricket', 'metro', 'u.s.',
                        'or \\. x', 'or \\. s w x', 'prepai k', 'prepai', 'what ty', 'what fe', 'feedb:', 'sele'
                    ];
                    
                    let preProcessedText = rawText;
                    cleaverList.forEach(phrase => {
                        preProcessedText = preProcessedText.replace(new RegExp(phrase, 'gi'), '\n');
                    });

                    // Stage 2: Split & Crush
                    let lines = preProcessedText.split('\n')
                        .map(line => line.replace(/\s+/g, ' ').trim())
                        .filter(line => line.length > 0);

                    const bannedWords = [
                        'walmart', 'feedback', 'device model', 'capacity', 'color', 
                        'availability status', 'in stock', 'prepaid', 'wireless', 
                        'dashboard', 'cellular', 'deviceonly', 'total items', 'select a row',
                        'what type', 'what fee', 'what feedba', 'select', 'carrier', '×', 'view inventory',
                        'store inventory', 'or . x', 'to view', 'out of stoc', 'what'
                    ];

                    const cleanedText = lines
                        // Stage 3 & 4: Auto-Fixes, Typos, and Noise Eraser
                        .map(line => {
                            let l = line.replace(/•/g, '');
                            l = l.replace(/Avallable|Avnitable|Avaltable|Atallabte/gi, 'available');
                            l = l.replace(/([a-zA-Z])\s+available/gi, '$1 1 available'); // Missing Quantity Fix
                            l = l.replace(/^[Il\-]\s+/i, ''); // Stray UI icon read as I, l, or -
                            l = l.replace(/IPhone/g, 'iPhone'); // Fix Apple capitalization
                            return l.trim();
                        })
                        // Stage 5: Strict Filter
                        .filter(line => {
                            if (!line) return false;
                            if (/^\d{1,2}:\d{2}$/.test(line)) return false; // Kills timestamps
                            if (/^\d+\s+\d+\s+\d+$/.test(line)) return false; // Kills stray number grids
                            const lowerLine = line.toLowerCase();
                            if (lowerLine === 'what' || lowerLine === 'k' || lowerLine === 'sele') return false; // Kills isolated garbage
                            return !bannedWords.some(banned => lowerLine.includes(banned));
                        })
                        // Stage 6: Orphan Stitcher
                        .reduce((acc, currentLine) => {
                            if (acc.length === 0) {
                                acc.push(currentLine);
                            } else {
                                const prevLine = acc[acc.length - 1];
                                if (!/available/i.test(prevLine)) {
                                    acc[acc.length - 1] = prevLine + ' ' + currentLine;
                                } else {
                                    acc.push(currentLine);
                                }
                            }
                            return acc;
                        }, [])
                        // Stage 6.5: Clean Trailing Garbage & Force Lowercase
                        .map(line => line.replace(/(available).*$/i, 'available').trim())
                        // Only keep valid lines
                        .filter(line => /available$/i.test(line))
                        .join('\n');

                    if (cleanedText) {
                        saveState(); 
                        
                        // Header Injector (Only if empty)
                        let currentText = scannerList.value.trim();
                        if (currentText === "") {
                            const carrierMap = { 'TMO': 'T-Mobile', 'VZW': 'Verizon', 'ATT': 'AT&T' };
                            const cName = carrierMap[currentCarrier] || currentCarrier;
                            const d = new Date();
                            const dStr = `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()} ${d.toLocaleTimeString('en-US')}`;
                            currentText = `${cName}\nDate: ${dStr} Store: ${currentStore}\nQuantity`;
                        }
                        
                        // Stage 7: Intra-Scan Deduplication & Safe Header Preservation
                        let headerLines = [];
                        const allLines = (currentText + '\n' + cleanedText).split('\n').map(l => l.trim()).filter(l => l);
                        
                        if (allLines.length >= 3 && ['T-Mobile', 'Verizon', 'AT&T'].includes(allLines[0])) {
                            headerLines = allLines.splice(0, 3);
                        }
                        
                        const uniqueItems = [...new Set(allLines)];
                        
                        if (headerLines.length > 0) {
                            scannerList.value = headerLines.join('\n') + '\n\n' + uniqueItems.join('\n');
                        } else {
                            scannerList.value = uniqueItems.join('\n');
                        }
                        
                        // Animation & Scroll
                        scannerList.classList.add('flash-green');
                        scannerList.scrollTop = scannerList.scrollHeight;
                        setTimeout(() => scannerList.classList.remove('flash-green'), 50);
                        statusEl.innerText = "Added!"; 
                    } else { statusEl.innerText = "Filtered to empty."; statusEl.style.color = "#ff9800"; }
                } else { statusEl.innerText = "API Error / No text."; statusEl.style.color = "#f44336"; }
            } catch (err) { statusEl.classList.remove('pulsing'); statusEl.innerText = "Network Error."; statusEl.style.color = "#f44336"; }

            setTimeout(() => { if (statusEl.innerText === "Added!" || statusEl.innerText.includes("empty")) { statusEl.innerText = "Ready."; statusEl.style.color = "#4CAF50"; } }, 2000);
        }

        // --- CROP ENGINE LOGIC ---
        let cropImg = document.getElementById('cropImage');

        let cropZoomSlider = document.getElementById('cropZoomSlider');
        let imgState = { x: 0, y: 0, scale: 1, baseW: 0, baseH: 0, isDragging: false, startX: 0, startY: 0 };

        document.getElementById('uploadImageBtn').addEventListener('click', () => {

        document.getElementById('imageUploadInput').addEventListener('change', (e) => {
            const file = e.target.files[0];

            const reader = new FileReader();
            reader.onload = (event) => {
                cropImg.onload = () => {
                    // Reset State and Calculate Aspect Ratio
                    const containerSize = cropContainer.clientWidth;
                    const aspect = cropImg.naturalWidth / cropImg.naturalHeight;
                    
                    if (aspect > 1) {
                        imgState.baseH = containerSize;
                        imgState.baseW = containerSize * aspect;
                    } else {
                        imgState.baseW = containerSize;
                        imgState.baseH = containerSize / aspect;
                    }
                    
                    imgState.scale = 1;
                    imgState.x = (containerSize - imgState.baseW) / 2;
                    imgState.y = (containerSize - imgState.baseH) / 2;
                    cropZoomSlider.value = 1;
                    
                    updateCropTransform();
                    stopCamera();
                    navigateTo('viewCrop');

            reader.readAsDataURL(file);

        });

        document.getElementById('cancelCropBtn').addEventListener('click', () => {
            navigateTo('viewScanner');
            startCamera();
        });

        function updateCropTransform() {
            cropImg.style.width = `${imgState.baseW}px`;
            cropImg.style.height = `${imgState.baseH}px`;
            cropImg.style.transform = `translate(${imgState.x}px, ${imgState.y}px) scale(${imgState.scale})`;
        }

        cropZoomSlider.addEventListener('input', (e) => {
            const newScale = parseFloat(e.target.value);
            // Zoom towards the center of the container
            const cx = cropContainer.clientWidth / 2;
            const cy = cropContainer.clientWidth / 2;
            
            const dx = cx - imgState.x;
            const dy = cy - imgState.y;
            
            imgState.x = cx - (dx * (newScale / imgState.scale));
            imgState.y = cy - (dy * (newScale / imgState.scale));
            imgState.scale = newScale;
            updateCropTransform();
        });

        // Touch & Mouse Panning
        const startDrag = (clientX, clientY) => {
            imgState.isDragging = true;
            imgState.startX = clientX - imgState.x;
            imgState.startY = clientY - imgState.y;
        };
        const moveDrag = (clientX, clientY) => {
            if (!imgState.isDragging) return;
            imgState.x = clientX - imgState.startX;
            imgState.y = clientY - imgState.startY;
            updateCropTransform();
        };
        const endDrag = () => { imgState.isDragging = false; };

        cropImg.addEventListener('mousedown', (e) => { e.preventDefault(); startDrag(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
        window.addEventListener('mouseup', endDrag);

        cropImg.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', (e) => {
            if (imgState.isDragging) e.preventDefault(); // Prevent scrolling while panning
            moveDrag(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchend', endDrag);

        // Confirm Crop & Send to OCR
        document.getElementById('confirmCropBtn').addEventListener('click', async () => {
            const btn = document.getElementById('confirmCropBtn');
            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            // Math to extract the high-res crop exactly matching the 1:1 view
            const containerSize = cropContainer.clientWidth;
            const ratio = cropImg.naturalWidth / imgState.baseW;
            
            const sourceX = (-imgState.x / imgState.scale) * ratio;
            const sourceY = (-imgState.y / imgState.scale) * ratio;
            const sourceSize = (containerSize / imgState.scale) * ratio;

            canvas.width = sourceSize;
            canvas.height = sourceSize;
            
            ctx.drawImage(cropImg, sourceX, sourceY, sourceSize, sourceSize, 0, 0, sourceSize, sourceSize);
            const base64Crop = canvas.toDataURL('image/jpeg', 0.9);

            btn.disabled = false;
            btn.innerText = "CONFIRM CROP & SCAN";

            navigateTo('viewScanner');
            await processOCR(base64Crop);
            startCamera();
        });
    </script>
</body>
</html>

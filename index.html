<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHE v0.0.7 - Primer</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #222; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Top 70% - Viewfinder */
        #top-half { position: relative; height: 70%; width: 100%; background: #000; overflow: hidden; }
        #viewfinder { width: 100%; height: 100%; object-fit: cover; }
        
        /* The Sniper Box */
        #sniper-box { position: absolute; top: 10%; left: 5%; width: 90%; height: 75%; border: 4px solid #0f0; pointer-events: none; box-shadow: 0 0 10px #0f0, inset 0 0 10px #0f0; transition: all 0.2s; }
        .flash-capture { border-color: #fff !important; box-shadow: 0 0 30px #fff, inset 0 0 30px #fff !important; background: rgba(255,255,255,0.2); }
        .locked-state { border-color: #555 !important; box-shadow: none !important; }

        /* The Blue Nav Guide */
        #blue-guide { position: absolute; bottom: 0; left: 0; width: 100%; height: 10%; background: rgba(0, 50, 150, 0.6); border-top: 2px solid #0055ff; display: flex; align-items: center; justify-content: center; gap: 40px; pointer-events: none; }
        .fake-back { width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-right: 15px solid rgba(255,255,255,0.7); }
        .fake-home { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.7); }

        /* Bottom 30% - Controls */
        #bottom-half { height: 30%; width: 100%; background: #ccc; color: #000; padding: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #bottom-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; }
        .btn-row { display: flex; gap: 20px; width: 100%; max-width: 400px; justify-content: center; }
        .btn { padding: 15px 30px; font-size: 22px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: #fff; flex: 1; }
        #btn-start-over { background: #e00; }
        #btn-finish { background: #007bff; }

        /* Results Screen */
        #results-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 100; display: none; padding: 20px; overflow-y: auto; color: #fff; }
        .log-entry { background: #222; padding: 12px; margin-bottom: 10px; border-left: 4px solid #0f0; font-family: monospace; border-radius: 4px; word-wrap: break-word; }
        #btn-close-results { background: #444; color: #fff; padding: 10px; border: none; border-radius: 5px; float: right; margin-bottom: 20px; }

        /* Hidden processing canvas */
        #motion-canvas, #capture-canvas { display: none; }
        #security-warning { display: none; background: #c00; padding: 20px; text-align: center; color: white; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
    </style>
</head>
<body>

    <div id="security-warning"><b>SECURITY LOCK:</b> Host this on HTTPS or Localhost!</div>

    <div id="top-half">
        <video id="viewfinder" autoplay playsinline></video>
        <div id="sniper-box"></div>
        <div id="blue-guide">
            <div class="fake-back"></div>
            <div class="fake-home"></div>
        </div>
    </div>

    <div id="bottom-half">
        <div id="bottom-title">Raw Text Primer (Dumb Mode)</div>
        <div class="btn-row">
            <button id="btn-start-over" class="btn">Start over</button>
            <button id="btn-finish" class="btn">Finish</button>
        </div>
    </div>

    <div id="results-screen">
        <button id="btn-close-results">New Session [X]</button>
        <h2>🦅 RAW TEXT CAPTURES</h2>
        <div id="master-data-body"></div>
    </div>

    <canvas id="motion-canvas" width="64" height="64"></canvas>
    <canvas id="capture-canvas"></canvas>

    <script>
        const video = document.getElementById('viewfinder');
        const sniperBox = document.getElementById('sniper-box');
        const motionCanvas = document.getElementById('motion-canvas');
        const captureCanvas = document.getElementById('capture-canvas');
        const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });
        
        // Don't forget to put your actual key here, I left it blank so I don't leak it!
        const API_KEY = 'K83239282988957'; 
        
        let masterScans = [];
        let state = 'INIT'; // INIT, HUNTING, API_LOCK, WAIT_FOR_MOTION
        let steadyFrames = 0;
        let lastImageData = null;
        let motionInterval = null;

        if (!window.isSecureContext && location.hostname !== "localhost") {
            document.getElementById('security-warning').style.display = 'block';
        }

        async function initCamera() {
            try {
                video.srcObject = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment', width: { ideal: 1920 } } 
                });
                state = 'HUNTING';
                startMotionDetection();
            } catch (e) {
                alert("Camera blocked. Check permissions.");
            }
        }

        function startMotionDetection() {
            motionInterval = setInterval(() => {
                if (state === 'API_LOCK' || state === 'INIT') return;

                motionCtx.drawImage(video, 0, 0, 64, 64);
                let currentData = motionCtx.getImageData(0, 0, 64, 64).data;
                let motionScore = 0;

                if (lastImageData) {
                    for (let i = 0; i < currentData.length; i += 16) {
                        motionScore += Math.abs(currentData[i] - lastImageData[i]);
                    }
                }
                lastImageData = currentData;

                if (motionScore > 1500) {
                    // Moving
                    if (state === 'WAIT_FOR_MOTION') {
                        // They scrolled! Reset the sniper and start hunting again.
                        sniperBox.classList.remove('locked-state');
                        state = 'HUNTING';
                    }
                    if (state === 'HUNTING') steadyFrames = 0;
                } else {
                    // Steady
                    if (state === 'HUNTING') {
                        steadyFrames++;
                        if (steadyFrames >= 5) { // Roughly 1 second of stillness
                            fireSilentCapture();
                        }
                    }
                }
            }, 200);
        }

        async function fireSilentCapture() {
            state = 'API_LOCK'; 
            
            // UI Feedback: Flash the box, then dim it to show it's locked
            sniperBox.classList.add('flash-capture');
            setTimeout(() => {
                sniperBox.classList.remove('flash-capture');
                sniperBox.classList.add('locked-state');
            }, 300);

            const ctx = captureCanvas.getContext('2d');
            captureCanvas.width = video.videoWidth;
            captureCanvas.height = video.videoHeight;
            // Removed aggressive filters to just focus on reading raw text
            ctx.drawImage(video, 0, 0);

            const fd = new FormData();
            fd.append('base64Image', captureCanvas.toDataURL('image/jpeg', 0.8));
            fd.append('apikey', API_KEY);
            fd.append('OCREngine', '2'); 

            try {
                const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: fd });
                const json = await res.json();
                
                // CRASH SHIELD: Check if the response actually has data
                if (!json.IsErroredOnProcessing && json.ParsedResults && json.ParsedResults.length > 0) {
                    extractDumbText(json.ParsedResults[0]);
                } else {
                    console.warn("OCR returned empty or errored. Screen might be blank.");
                }
            } catch (err) {
                console.error("API Crash:", err);
            }

            // Tell the loop to wait until you physically move the camera before taking another shot
            state = 'WAIT_FOR_MOTION';
            steadyFrames = 0;
        }

        function extractDumbText(result) {
            // Literally just grabs everything the API saw and shoves it into a string
            if (!result.TextOverlay) return;
            
            let rawLines = result.TextOverlay.Lines.map(l => l.LineText).join(' | ');
            if (rawLines.trim().length > 0) {
                masterScans.push(rawLines);
            }
        }

        // Controls
        document.getElementById('btn-finish').onclick = () => {
            clearInterval(motionInterval);
            video.srcObject.getTracks().forEach(track => track.stop());
            
            const tbody = document.getElementById('master-data-body');
            tbody.innerHTML = '';
            
            masterScans.forEach((scan, index) => {
                tbody.innerHTML += `<div class="log-entry"><strong>Capture ${index + 1}:</strong> ${scan}</div>`;
            });
            
            document.getElementById('results-screen').style.display = 'block';
        };

        document.getElementById('btn-start-over').onclick = () => {
            masterScans = [];
            state = 'HUNTING';
            steadyFrames = 0;
            sniperBox.classList.remove('locked-state');
            sniperBox.classList.remove('flash-capture');
        };

        document.getElementById('btn-close-results').onclick = () => {
            location.reload();
        };

        initCamera();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project IRIS - Scanner</title>
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="android-chrome-512x512.png">

    <!-- Import Tesseract.js v5 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #4CAF50;
        }
        #status {
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffeb3b;
            text-align: center;
        }
        
        /* Video & Reticle Container */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            width: 100%;
            display: block;
        }
        
        /* The Targeting Box */
        #reticle {
            position: absolute;
            width: 80%;
            height: 25%;
            border: 3px solid #00ff00;
            /* This shadow creates a dimming effect outside the box */
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            pointer-events: none; /* Lets you tap through it if needed */
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            max-width: 500px;
            height: 150px;
            background: #1e1e1e;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            font-size: 1rem;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }
        button {
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active {
            opacity: 0.7;
        }
        button:disabled {
            background-color: #555 !important;
            color: #888 !important;
            cursor: not-allowed;
        }
        
        /* Button Layout */
        #scanBtn {
            flex-basis: 100%;
            background-color: #4CAF50;
            color: white;
            margin-bottom: 5px;
            font-size: 1.2rem;
        }
        #copyBtn {
            flex: 1;
            background-color: #2196F3;
            color: white;
        }
        #clearBtn {
            flex: 1;
            background-color: #f44336;
            color: white;
        }
        
        /* Hidden canvas for cropping */
        #hiddenCanvas {
            display: none;
        }
    </style>
</head>
<body>

    <h1>Project IRIS</h1>
    <div id="status">Initializing Camera & AI...</div>

    <div class="video-container">
        <video id="cameraFeed" autoplay playsinline></video>
        <div id="reticle"></div>
    </div>

    <textarea id="output" placeholder="Scanned text will append here..." readonly></textarea>

    <div class="controls">
        <button id="scanBtn" disabled>Scan Target</button>
        <button id="copyBtn">Copy List</button>
        <button id="clearBtn">Clear List</button>
    </div>

    <canvas id="hiddenCanvas"></canvas>

    <script>
        const video = document.getElementById('cameraFeed');
        const canvas = document.getElementById('hiddenCanvas');
        const ctx = canvas.getContext('2d');
        const statusEl = document.getElementById('status');
        const outputEl = document.getElementById('output');
        const scanBtn = document.getElementById('scanBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const reticle = document.getElementById('reticle');

        let worker = null;

        async function initApp() {
            try {
                // 1. Request Camera
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                video.srcObject = stream;

                // 2. Initialize Tesseract
                worker = await Tesseract.createWorker('eng');
                
                // 3. Ready State
                statusEl.innerText = "Ready. Align text in box and Scan.";
                statusEl.style.color = "#4CAF50";
                scanBtn.disabled = false;

            } catch (err) {
                console.error(err);
                statusEl.innerText = "Error: Camera access denied or unsupported.";
                statusEl.style.color = "#f44336";
            }
        }

        scanBtn.addEventListener('click', async () => {
            if (!worker) return;

            // UI Feedback
            scanBtn.disabled = true;
            statusEl.innerText = "Scanning crop...";
            statusEl.style.color = "#ffeb3b";

            // Safety check
            if (video.videoWidth === 0) {
                scanBtn.disabled = false;
                return;
            }

            // --- THE CROP MATH ---
            // 1. Get the actual rendered size of the video and the reticle on screen
            const videoRect = video.getBoundingClientRect();
            const reticleRect = reticle.getBoundingClientRect();

            // 2. Calculate the scale difference between the screen size and the raw camera feed size
            const scaleX = video.videoWidth / videoRect.width;
            const scaleY = video.videoHeight / videoRect.height;

            // 3. Calculate the exact X/Y and Width/Height of the crop relative to the raw camera feed
            const sourceX = (reticleRect.left - videoRect.left) * scaleX;
            const sourceY = (reticleRect.top - videoRect.top) * scaleY;
            const sourceW = reticleRect.width * scaleX;
            const sourceH = reticleRect.height * scaleY;

            // 4. Resize canvas to match the exact crop dimensions
            canvas.width = sourceW;
            canvas.height = sourceH;

            // 5. Draw ONLY the cropped area to the canvas
            ctx.drawImage(
                video, 
                sourceX, sourceY, sourceW, sourceH, // Source (Camera Feed)
                0, 0, sourceW, sourceH              // Destination (Canvas)
            );

            try {
                // Send the tiny cropped canvas to Tesseract
                const { data: { text } } = await worker.recognize(canvas);
                const cleanedText = text.trim();

                if (cleanedText) {
                    // Append logic: Add a line break if text already exists
                    if (outputEl.value) {
                        outputEl.value += '\n' + cleanedText;
                    } else {
                        outputEl.value = cleanedText;
                    }
                    
                    // Auto-scroll to the bottom of the text box
                    outputEl.scrollTop = outputEl.scrollHeight;
                    
                    statusEl.innerText = "Added to list!";
                    statusEl.style.color = "#4CAF50";
                } else {
                    statusEl.innerText = "No text found in box.";
                    statusEl.style.color = "#ff9800";
                }
            } catch (err) {
                console.error("OCR Error:", err);
                statusEl.innerText = "OCR Error.";
                statusEl.style.color = "#f44336";
            }

            // Restore UI
            scanBtn.disabled = false;
            setTimeout(() => {
                if (statusEl.innerText === "Added to list!" || statusEl.innerText === "No text found in box.") {
                    statusEl.innerText = "Ready. Align text in box and Scan.";
                    statusEl.style.color = "#4CAF50";
                }
            }, 2500);
        });

        // Copy Button Listener
        copyBtn.addEventListener('click', async () => {
            if (!outputEl.value) return;
            try {
                await navigator.clipboard.writeText(outputEl.value);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => copyBtn.innerText = originalText, 2000);
            } catch (err) {
                alert("Failed to copy text. Please copy manually.");
            }
        });

        // Clear Button Listener
        clearBtn.addEventListener('click', () => {
            outputEl.value = "";
            statusEl.innerText = "List cleared. Ready.";
            statusEl.style.color = "#4CAF50";
        });

        // Bootstrap the app
        window.addEventListener('load', initApp);
    </script>
</body>
</html>
